<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - CAPY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Pra usar como base de modelos prontos: https://getbootstrap.com/docs/5.0/examples/cheatsheet/ -->
    <!-- Pra usar como base das notações de espaçamento: https://getbootstrap.com/docs/4.0/utilities/spacing/ -->
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- Para usar fontes do Google -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!-- Para usar fontes do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"> <!-- Para a Montserrat -->
    <link href="styles.css" rel="stylesheet"> <!-- Pro botão de Voltar ao Topo -->
</head>
<body>

    <!-- Menu de Navegação -->
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand mx-4 logo-size" href="index.html"> 
                    <img src="resources/imgs/logo.png" alt="logo da empresa"> 
                    <span>CAPY</span> 
                </a> 
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-2"> 
                        <li class="nav-item"><a class="nav-link" href="produtos.html">Produtos</a></li>
                        <li class="nav-item"><a class="nav-link" href="precos.html">Preços</a></li>
                        <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contato.html">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">

        <!-- Isso daqui é pra fazer todo o 'main' da página ficar alinhado ao centro da página -->
        <div class="row justify-content-center">
            <div class="col-lg-9">

                <!-- Título da Página -->
                <div class="text-center mb-5">
                    <h1 class="fw-bold">Fale Conosco</h1>
                    <p class="text-muted">Tem alguma dúvida, sugestão ou quer fazer um pedido especial? Preencha o formulário abaixo.</p>
                </div>

                <!-- Formulário -->
                <div class="card shadow-sm border-0 bg-light p-4 p-md-5">
                    <form id="formContato">
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="nome" class="form-label fw-bold">Nome Completo <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="email" class="form-label fw-bold">E-mail <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="email" placeholder="seu@email.com">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="tel" class="form-label fw-bold">Telefone</label>
                                <input type="tel" class="form-control" id="tel" placeholder="Digite seu telefone">
                            </div>
                        </div>

                        <div class="row">
                            <div class="mb-3">
                                <label for="assunto" class="form-label fw-bold">Assunto</label>
                                <input type="text" class="form-control" id="assunto" placeholder="Sobre o que quer falar?">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="mensagem" class="form-label fw-bold">Mensagem <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="mensagem" rows="5" placeholder="Digite sua mensagem (mínimo de 20 caracteres)"></textarea>
                            <div class="form-text mt-2">
                                Caracteres digitados: <strong id="contador" style="color: red;">0</strong> (mínimo de 20).
                            </div>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-dark px-5 py-2">Enviar Mensagem</button>
                        </div>

                    </form>
                </div>

            </div>
        </div>

    </main>

    <!-- Barra Inferior -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0"> &copy; CAPY 2026 - Todos os direitos reservados.</p>
    </footer>

    <button id="btnTopo" title="Voltar ao topo">↑ Voltar ao Topo</button>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts.js"></script>

</body>
</html>
